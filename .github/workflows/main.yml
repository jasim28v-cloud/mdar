# .github/workflows/main.yml
# 💖 MADAR ALTECHNIA - GitHub Pages Auto Deploy

name: 💖 Deploy Madar Altechnia to GitHub Pages

on:
  push:
    branches: [main, master]
  schedule:
    - cron: '0 0 * * *'  # تشغيل يومي لتحديث التاريخ
  workflow_dispatch:  # تشغيل يدوي

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  generate-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 📥 استنساخ المستودع
        uses: actions/checkout@v4

      - name: 🐍 تثبيت بايثون
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 💖 توليد الموقع
        run: |
          python scraper.py
          echo "✅ تم توليد الموقع بنجاح"

      - name: 📁 تحضير مجلد النشر
        run: |
          mkdir -p _site
          cp index.html _site/
          # يمكنك نسخ أي ملفات إضافية هنا (CSS, images, etc.)
          echo "📁 تم تجهيز مجلد _site"

      - name: ⚙️ إعداد GitHub Pages
        uses: actions/configure-pages@v4

      - name: 📤 رفع الملفات
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: 🚀 نشر على GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
